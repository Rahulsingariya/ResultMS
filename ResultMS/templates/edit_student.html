{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}
{% block page_title %}Edit Student{% endblock %}

{% block content %}
<div class="form-container">
  <div class="card">
    <div class="card-header">
      <h3>Edit Student — <span class="text-muted">{{ student.roll_no }}</span></h3>
      <a href="{{ url_for('students') }}" class="link-sm">← Back</a>
    </div>
    <form method="post" class="form-body">
      <div class="form-row">
        <div class="form-group">
          <label>Roll Number</label>
          <input type="text" value="{{ student.roll_no }}" disabled class="form-input disabled"/>
        </div>
        <div class="form-group">
          <label>Full Name <span class="required">*</span></label>
          <input type="text" name="name" value="{{ student.name }}" required class="form-input"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Class <span class="required">*</span></label>
          <select name="class" required class="form-input">
            {% for cls in ['Class 9','Class 10','Class 11','Class 12'] %}
            <option {% if student.class == cls %}selected{% endif %}>{{ cls }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Section <span class="required">*</span></label>
          <select name="section" required class="form-input">
            {% for sec in ['A','B','C','D','E'] %}
            <option {% if student.section == sec %}selected{% endif %}>{{ sec }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" value="{{ student.email or '' }}" class="form-input"/>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg">✓ Save Changes</button>
        <a href="{{ url_for('students') }}" class="btn btn-ghost btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
